 <!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Diamond Puzzle Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; text-align: center; margin: 0; padding: 15px; }
        .stats { display: flex; justify-content: space-around; background: #1a1a1a; padding: 12px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #00d2ff; }
        .difficulty-selector { margin-bottom: 15px; display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; }
        .diff-btn { padding: 8px 12px; border-radius: 10px; border: 1px solid #444; background: #222; color: #888; cursor: pointer; font-size: 12px; }
        .diff-btn.active { background: #00d2ff; color: #000; border-color: #00d2ff; font-weight: bold; }
        #puzzle-board { display: grid; gap: 4px; justify-content: center; margin: 0 auto; background: #222; padding: 6px; border-radius: 12px; }
        .tile { background-image: url('https://img.freepik.com/free-photo/shiny-diamond-crystal-gemstone-luxury-wealth_53876-121226.jpg'); background-size: 400px 400px; border-radius: 4px; cursor: pointer; }
        .empty { background: #0f0f0f; border: none; cursor: default; }
        .action-btns { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px; border-radius: 10px; width: 85%; max-width: 220px; font-weight: bold; border: none; cursor: pointer; }
        .btn-restart { background: #ff4757; color: white; }
        .btn-withdraw { background: #2ecc71; color: white; }
    </style>
</head>
<body>
    <h3 style="color: #00d2ff; margin-bottom: 10px;">💎 Diamond Puzzle Pro</h3>
    
    <div class="stats">
        <div>Player: <b id="user-name">...</b></div>
        <div><span id="total-diamonds" style="color: #00d2ff;">0</span> 💎</div>
    </div>

    <div class="difficulty-selector">
        <button class="diff-btn active" onclick="setDiff(4)">Lvl 1 (4x4)</button>
        <button class="diff-btn" onclick="setDiff(5)">Lvl 2 (5x5)</button>
        <button class="diff-btn" onclick="setDiff(6)">Lvl 3 (6x6)</button>
    </div>

    <div id="puzzle-board"></div>

    <div class="action-btns">
        <button class="btn btn-restart" onclick="shuffle()">Restart Level</button>
        <button class="btn btn-withdraw" onclick="openWithdraw()">Withdraw Diamonds</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let gridSize = 4;
        let tiles = [];
        let score = parseInt(localStorage.getItem('diamondScore')) || 0;
        document.getElementById('total-diamonds').innerText = score;
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "Ruata_!";

        function setDiff(size) {
            gridSize = size;
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.includes(`${size}x${size}`)) btn.classList.add('active');
            });
            initGame();
        }

        function initGame() {
            tiles = Array.from({length: gridSize * gridSize}, (_, i) => i);
            shuffle();
        }

        function createBoard() {
            const board = document.getElementById('puzzle-board');
            board.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            const containerSize = Math.min(window.innerWidth - 40, 350);
            const tileSize = (containerSize / gridSize) - 4;
            board.style.width = containerSize + "px";
            board.innerHTML = '';

            tiles.forEach((tile, index) => {
                const div = document.createElement('div');
                div.style.width = tileSize + "px";
                div.style.height = tileSize + "px";
                div.classList.add('tile');
                if (tile === (gridSize * gridSize - 1)) {
                    div.classList.add('empty');
                } else {
                    const x = (tile % gridSize) * (400 / gridSize);
                    const y = Math.floor(tile / gridSize) * (400 / gridSize);
                    div.style.backgroundSize = "400px 400px";
                    div.style.backgroundPosition = `-${x}px -${y}px`;
                }
                div.onclick = () => moveTile(index);
                board.appendChild(div);
            });
        }

        function moveTile(index) {
            const emptyIndex = tiles.indexOf(gridSize * gridSize - 1);
            const row = Math.floor(index / gridSize), col = index % gridSize;
            const emptyRow = Math.floor(emptyIndex / gridSize), emptyCol = emptyIndex % gridSize;
            if (Math.abs(row - emptyRow) + Math.abs(col - emptyCol) === 1) {
                [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
                createBoard();
                checkWin();
            }
        }

                if (emptyIndex < gridSize * (gridSize - 1)) neighbors.push(emptyIndex + gridSize);
