 <style>
    .store-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
    .store-card { background: white; color: #333; padding: 15px 5px; border-radius: 10px; border: 1px solid #ddd; cursor: pointer; }
    .store-card.selected { border: 2px solid #f39c12; background: #fff9f0; }
    
    .payment-options { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
    .pay-mode { padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; font-size: 12px; cursor: pointer; }
    .pay-mode.active { background: #f39c12; color: white; border-color: #f39c12; }

    .checkout-bar { position: sticky; bottom: 0; background: white; padding: 15px; border-top: 2px solid #f39c12; display: flex; justify-content: space-between; align-items: center; }
    .price-tag { color: #f39c12; font-size: 18px; font-weight: bold; }
    .buy-btn { background: #f39c12; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; }
</style>

<div id="store-section" style="display:none; background:#f4f4f4; color:#333;">
    <div style="background: white; padding: 15px; border-bottom: 1px solid #ddd;">
        <button class="btn btn-back" style="width: auto;" onclick="toggleStore(false)">⬅ Back</button>
        <h3 style="margin-top:10px;">Diamond Store</h3>
        
        <div class="payment-options">
            <div id="mode-points" class="pay-mode active" onclick="setMode('points')">Use Points</div>
            <div id="mode-gpay" class="pay-mode" onclick="setMode('gpay')">Buy with G-Pay</div>
        </div>
    </div>

    <div class="store-grid" id="items-list">
        </div>

    <div class="checkout-bar">
        <div class="price-tag" id="price-display">Select Item</div>
        <button class="buy-btn" id="action-btn" onclick="handleAction()">PROCEED</button>
    </div>
</div>

<script>
    let currentMode = 'points';
    let selectedItem = null;

    const mlItems = [
        { name: '5 Diamonds', points: 5000, gpay: 10 },
        { name: '12 Diamonds', points: 12000, gpay: 20 },
        { name: '50 Diamonds', points: 50000, gpay: 85 },
        { name: 'Starlight', points: 300000, gpay: 450 }
    ];

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.pay-mode').forEach(el => el.classList.remove('active'));
        document.getElementById('mode-' + mode).classList.add('active');
        renderItems();
        updatePriceDisplay();
    }

    function renderItems() {
        const list = document.getElementById('items-list');
        list.innerHTML = '';
        mlItems.forEach(item => {
            const card = document.createElement('div');
            card.className = 'store-card';
            card.innerHTML = `<b>${item.name}</b><br><small>${currentMode === 'points' ? item.points + ' Points' : '₹' + item.gpay}</small>`;
            card.onclick = () => {
                selectedItem = item;
                document.querySelectorAll('.store-card').forEach(c => c.style.border = '1px solid #ddd');
                card.style.border = '2px solid #f39c12';
                updatePriceDisplay();
            };
            list.appendChild(card);
        });
    }

    function updatePriceDisplay() {
        if (!selectedItem) return;
        const display = document.getElementById('price-display');
        display.innerText = currentMode === 'points' ? selectedItem.points + ' 💎' : '₹' + selectedItem.gpay;
    }

    function handleAction() {
        if (!selectedItem) { tg.showAlert("Item thlang hmasa rawh le!"); return; }

        if (currentMode === 'points') {
            if (score >= selectedItem.points) {
                tg.showConfirm(`${selectedItem.name} i Redeem duh tak tak em?`, (ok) => {
                    if (ok) {
                        score -= selectedItem.points;
                        localStorage.setItem('diamondScore', score);
                        document.getElementById('total-diamonds').innerText = score;
                        tg.showAlert("Redeem hlawhtling! Screenshot la la Admin hrilh rawh.");
                    }
                });
            } else {
                tg.showAlert("I point a la tawk lo!");
            }
        } else {
            // G-Pay Mode
            tg.showAlert(`₹${selectedItem.gpay} i pe dawn a ni. I G-Pay-ah va lut la, Ruata G-Pay-ah hian va thawn la, screenshot min rawn thawn rawh.`);
            // Heti hian i G-Pay Link kan dah thei ang
            window.location.href = "https://t.me/YOUR_USERNAME"; // I hnenah a rawn kal dawn
        }
    }

    renderItems();
</script>
