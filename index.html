 <!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Diamond Puzzle Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; text-align: center; margin: 0; padding: 15px; }
        .stats { display: flex; justify-content: space-around; background: #1a1a1a; padding: 10px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #00d2ff; }
        .difficulty-selector { margin-bottom: 15px; display: flex; justify-content: center; gap: 5px; }
        .diff-btn { padding: 8px 10px; border-radius: 8px; border: 1px solid #444; background: #222; color: #888; cursor: pointer; font-size: 12px; }
        .diff-btn.active { background: #00d2ff; color: #000; font-weight: bold; }
        #puzzle-board { display: grid; gap: 5px; justify-content: center; margin: 0 auto; background: #222; padding: 5px; border-radius: 10px; }
        .tile { background: #0088cc; color: white; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; box-shadow: inset 0 0 10px rgba(255,255,255,0.2); }
        .empty { background: #0f0f0f; border: none; cursor: default; box-shadow: none; }
        .btn { padding: 12px; border-radius: 10px; width: 85%; max-width: 200px; font-weight: bold; border: none; margin-top: 15px; cursor: pointer; }
        .btn-restart { background: #ff4757; color: white; }
    </style>
</head>
<body>
    <h3 style="color: #00d2ff;">💎 Diamond Puzzle Pro</h3>
    <div class="stats">
        <div>Player: <b id="user-name">...</b></div>
        <div>Score: <b id="total-diamonds">0</b> 💎</div>
    </div>
    <div class="difficulty-selector">
        <button class="diff-btn active" onclick="setDiff(4)">4x4</button>
        <button class="diff-btn" onclick="setDiff(5)">5x5</button>
        <button class="diff-btn" onclick="setDiff(6)">6x6</button>
    </div>
    <div id="puzzle-board"></div>
    <button class="btn btn-restart" onclick="shuffle()">Restart Level</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let gridSize = 4;
        let tiles = [];
        let score = parseInt(localStorage.getItem('diamondScore')) || 0;
        document.getElementById('total-diamonds').innerText = score;
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "Player";

        function setDiff(size) {
            gridSize = size;
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.includes(size)) btn.classList.add('active');
            });
            initGame();
        }

        function initGame() {
            tiles = Array.from({length: gridSize * gridSize}, (_, i) => i);
            shuffle();
        }

        function createBoard() {
            const board = document.getElementById('puzzle-board');
            board.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            const containerSize = Math.min(window.innerWidth - 40, 350);
            const tileSize = (containerSize / gridSize) - 5;
            board.style.width = containerSize + "px";
            board.innerHTML = '';
            tiles.forEach((tile, index) => {
                const div = document.createElement('div');
                div.style.width = tileSize + "px";
                div.style.height = tileSize + "px";
                div.classList.add('tile');
                if (tile === (gridSize * gridSize - 1)) {
                    div.classList.add('empty');
                    div.innerText = '';
                } else {
                    div.innerText = tile + 1;
                }
                div.onclick = () => moveTile(index);
                board.appendChild(div);
            });
        }

        function moveTile(index) {
            const emptyIndex = tiles.indexOf(gridSize * gridSize - 1);
            const row = Math.floor(index / gridSize), col = index % gridSize;
            const eRow = Math.floor(emptyIndex / gridSize), eCol = emptyIndex % gridSize;
            if (Math.abs(row - eRow) + Math.abs(col - eCol) === 1) {
                [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
                createBoard();
                if (tiles.every((t, i) => t === i)) {
                    let reward = gridSize === 4 ? 100 : gridSize === 5 ? 300 : 1000;
                    score += reward;
                    localStorage.setItem('diamondScore', score);
                    document.getElementById('total-diamonds').innerText = score;
                    tg.showAlert(`CONGRATS! 💎 ${reward} hlawh e!`);
                    shuffle();
                }
            }
        }

        function shuffle() {
            for (let i = 0; i < 200; i++) {
                const emptyIndex = tiles.indexOf(gridSize * gridSize - 1);
                const neighbors = [];
                if (emptyIndex >= gridSize) neighbors.push(emptyIndex - gridSize);
                if (emptyIndex < gridSize * (gridSize - 1)) neighbors.push(emptyIndex + gridSize);
                if (emptyIndex % gridSize !== 0) neighbors.push(emptyIndex - 1);
                if (emptyIndex % gridSize !== gridSize - 1) neighbors.push(emptyIndex + 1);
                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                [tiles[emptyIndex], tiles[randomNeighbor]] = [tiles[randomNeighbor], tiles[emptyIndex]];
            }
            createBoard();
        }
        initGame();
    </script>
</body>
</html>
