 <!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Diamond Puzzle Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        .stats { display: flex; justify-content: space-around; background: #1a1a1a; padding: 10px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #f1c40f; }
        
        /* Coin Style */
        .coin-icon { color: #f1c40f; text-shadow: 0 0 5px rgba(241, 196, 15, 0.5); }
        
        .store-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .store-card { background: white; color: #333; padding: 12px 5px; border-radius: 10px; border: 1px solid #ddd; cursor: pointer; text-align: center; }
        .store-card.selected { border: 2.5px solid #f1c40f; background: #fffdf0; }
        
        .payment-options { display: flex; justify-content: center; gap: 8px; margin: 10px 0; }
        .pay-mode { padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; font-size: 11px; cursor: pointer; background: #eee; color: #333; font-weight: bold; }
        .pay-mode.active { background: #f1c40f; color: white; border-color: #f1c40f; }

        #puzzle-board { display: grid; gap: 5px; justify-content: center; margin: 10px auto; background: #222; padding: 8px; border-radius: 12px; border: 2px solid #333; }
        .tile { background: linear-gradient(135deg, #f1c40f, #f39c12); color: black; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .empty { background: #0f0f0f; border: none; box-shadow: none; }

        .checkout-bar { position: sticky; bottom: 0; background: white; padding: 15px; border-top: 3px solid #f1c40f; display: flex; justify-content: space-between; align-items: center; border-radius: 20px 20px 0 0; }
        .price-tag { color: #d35400; font-size: 16px; font-weight: bold; }
        .action-btn { background: #f1c40f; color: black; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .btn { padding: 12px; border-radius: 12px; width: 85%; font-weight: bold; border: none; cursor: pointer; margin: 8px 0; text-transform: uppercase; }
        .btn-restart { background: #ff4757; color: white; }
        .btn-store { background: #f1c40f; color: black; box-shadow: 0 4px 10px rgba(241, 196, 15, 0.3); }
    </style>
</head>
<body>

    <div id="game-ui">
        <h3 style="color: #f1c40f; margin: 15px 0;">💎 Diamond Coin Puzzle</h3>
        <div class="stats">
            <div>Player: <b id="user-name">...</b></div>
            <div>Coins: <b id="total-diamonds" class="coin-icon">0</b> 🪙</div>
        </div>
        <div id="puzzle-board"></div>
        <button class="btn btn-restart" onclick="shuffle()">Restart Level</button>
        <button class="btn btn-store" onclick="toggleStore(true)">🛒 Redeem Diamond Coins</button>
    </div>

    <div id="store-section" style="display:none; background:#f4f4f4; color:#333; min-height: 100vh;">
        <div style="background: white; padding: 15px; border-bottom: 1px solid #ddd;">
            <button onclick="toggleStore(false)" style="background:none; border:none; color:#f39c12; font-weight:bold; cursor:pointer; font-size: 16px;">⬅ Back</button>
            <h3 style="margin: 15px 0;">Diamond Coin Store</h3>
            <div class="payment-options">
                <div id="mode-points" class="pay-mode active" onclick="setMode('points')">Spend Coins</div>
                <div id="mode-gpay" class="pay-mode" onclick="setMode('gpay')">Buy (G-Pay)</div>
            </div>
        </div>
        <div class="store-grid" id="items-list"></div>
        <div class="checkout-bar">
            <div class="price-tag" id="price-display">Select Item</div>
            <button class="action-btn" onclick="handleAction()">PROCEED</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let gridSize = 4;
        let tiles = [];
        let score = parseInt(localStorage.getItem('diamondScore')) || 0;
        let currentMode = 'points';
        let selectedItem = null;

        const mlItems = [
            { name: '5 Diamonds', points: 500, gpay: 10 },
            { name: '12 Diamonds', points: 1200, gpay: 20 },
            { name: '50 Diamonds', points: 5000, gpay: 85 },
            { name: 'Starlight', points: 30000, gpay: 450 }
        ];

        document.getElementById('total-diamonds').innerText = score;
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "Player";

        function toggleStore(show) {
            document.getElementById('game-ui').style.display = show ? 'none' : 'block';
            document.getElementById('store-section').style.display = show ? 'block' : 'none';
            if(show) renderItems();
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.pay-mode').forEach(el => el.classList.remove('active'));
            document.getElementById('mode-' + mode).classList.add('active');
            renderItems();
        }

        function renderItems() {
            const list = document.getElementById('items-list');
            list.innerHTML = '';
            mlItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'store-card';
                card.innerHTML = `<b>${item.name}</b><br><small>${currentMode==='points' ? item.points+' Coins' : '₹'+item.gpay}</small>`;
                card.onclick = () => {
                    selectedItem = item;
                    document.querySelectorAll('.store-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    document.getElementById('price-display').innerText = currentMode==='points' ? item.points+' Coins' : '₹'+item.gpay;
                };
                list.appendChild(card);
            });
        }

                function handleAction() {
            if (!selectedItem) { tg.showAlert("Item thlang rawh!"); return; }
            if (currentMode === 'points') {
                if (score >= selectedItem.points) {
                    tg.showConfirm(`${selectedItem.name} hi ${selectedItem.points} Diamond Coins in i redeem duh em?`, (ok) => {
                        if(ok) {
                            score -= selectedItem.points;
                            localStorage.setItem('diamondScore', score);
                            document.getElementById('total-diamonds').innerText = score;
                            tg.showAlert("Success! Admin hnenah i ML ID leh score screenshot hi thawn rawh le.");
                            window.location.href = "https://t.me/Ruata_zote"; // He line hi va dah rawh
                        }
                    });
                } else { tg.showAlert("I Diamond Coin a la tawk lo! Khel hnem deuh rawh."); }
            } else {
                tg.showAlert(`₹${selectedItem.gpay} man ${selectedItem.name} lei turin Admin be rawh.`);
                window.location.href = "https://t.me/Ruata_zote"; // He line chauh hi dah rawh
            }
        }

            }
        }

        function initGame() {
            tiles = Array.from({length: gridSize * gridSize}, (_, i) => i);
            shuffle();
        }

        function createBoard() {
            const board = document.getElementById('puzzle-board');
            board.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            const containerSize = Math.min(window.innerWidth - 30, 340);
            const tileSize = (containerSize / gridSize) - 6;
            board.style.width = containerSize + "px";
            board.innerHTML = '';
            tiles.forEach((tile, index) => {
                const div = document.createElement('div');
                div.style.width = tileSize + "px"; div.style.height = tileSize + "px";
                div.classList.add('tile');
                if (tile === gridSize * gridSize - 1) div.classList.add('empty');
                else div.innerText = tile + 1;
                div.onclick = () => moveTile(index);
                board.appendChild(div);
            });
        }

        function moveTile(index) {
            const emptyIdx = tiles.indexOf(gridSize * gridSize - 1);
            const row = Math.floor(index/gridSize), col = index%gridSize;
            const eRow = Math.floor(emptyIdx/gridSize), eCol = emptyIdx%gridSize;
            if (Math.abs(row-eRow) + Math.abs(col-eCol) === 1) {
                [tiles[index], tiles[emptyIdx]] = [tiles[emptyIdx], tiles[index]];
                createBoard();
                if (tiles.every((t, i) => t === i)) {
                    score += 5;
                    localStorage.setItem('diamondScore', score);
                    document.getElementById('total-diamonds').innerText = score;
                    tg.showAlert("Level Complete! +5 Diamond Coins 🪙");
                    shuffle();
                }
            }
        }

        function shuffle() {
            for (let i = 0; i < 200; i++) {
                const emptyIdx = tiles.indexOf(gridSize * gridSize - 1);
                const n = [];
                if (emptyIdx >= gridSize) n.push(emptyIdx - gridSize);
                if (emptyIdx < gridSize*(gridSize-1)) n.push(emptyIdx + gridSize);
                if (emptyIdx % gridSize !== 0) n.push(emptyIdx - 1);
                if (emptyIdx % gridSize !== gridSize-1) n.push(emptyIdx + 1);
                const r = n[Math.floor(Math.random()*n.length)];
                [tiles[emptyIdx], tiles[r]] = [tiles[r], tiles[emptyIdx]];
            }
            createBoard();
        }
        initGame();
    </script>
</body>
</html>
