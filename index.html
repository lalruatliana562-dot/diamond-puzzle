<!DOCTYPE html>
<html>
<head>
    <title>Diamond Puzzle Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #212121; color: white; }
        .game-box { margin-top: 50px; padding: 20px; border: 2px solid #0088cc; border-radius: 15px; }
        button { background: #0088cc; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="game-box">
        <h1>💎 Diamond Puzzle Pro</h1>
        <p>Welcome, <span id="username">Player</span>!</p>
        <div id="game-status">Game Loading...</div>
        <br>
        <button onclick="tg.close()">Close App</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // App kha a pum (full screen) in a inhawng ang
        document.getElementById("username").innerText = tg.initDataUnsafe.user.first_name;
        document.getElementById("game-status").innerText = "Ready to Play!";
    </script>
</body>
</html>
