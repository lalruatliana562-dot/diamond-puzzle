  <!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Diamond Puzzle Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; text-align: center; margin: 0; padding: 15px; }
        .stats { display: flex; justify-content: space-around; background: #1a1a1a; padding: 10px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #00d2ff; }
        #puzzle-board { display: grid; gap: 5px; justify-content: center; margin: 10px auto; background: #222; padding: 8px; border-radius: 10px; }
        .tile { background: #00d2ff; color: #000; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; cursor: pointer; }
        .empty { background: #0f0f0f; }
        .btn { padding: 12px; border-radius: 10px; width: 85%; font-weight: bold; border: none; margin-top: 15px; cursor: pointer; background: #f39c12; color: white; }
    </style>
</head>
<body>
    <h3 style="color: #00d2ff;">💎 Diamond Puzzle Pro</h3>
    <div class="stats">
        <div>Player: <b id="user-name">...</b></div>
        <div>Score: <b id="total-diamonds">0</b> 💎</div>
    </div>
    <div id="puzzle-board"></div>
    <button class="btn" onclick="shuffle()">Restart Game</button>
    <p style="font-size: 12px; color: #888; margin-top: 20px;">Redeem turin Admin hnenah message thawn rawh.</p>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let gridSize = 4;
        let tiles = [];
        let score = parseInt(localStorage.getItem('diamondScore')) || 0;
        document.getElementById('total-diamonds').innerText = score;
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "Player";

        function initGame() {
            tiles = Array.from({length: gridSize * gridSize}, (_, i) => i);
            shuffle();
        }

        function createBoard() {
            const board = document.getElementById('puzzle-board');
            board.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            const containerSize = Math.min(window.innerWidth - 40, 320);
            const tileSize = (containerSize / gridSize) - 5;
            board.style.width = containerSize + "px";
            board.innerHTML = '';
            tiles.forEach((tile, index) => {
                const div = document.createElement('div');
                div.style.width = tileSize + "px"; div.style.height = tileSize + "px";
                div.classList.add('tile');
                if (tile === gridSize * gridSize - 1) div.classList.add('empty');
                else div.innerText = tile + 1;
                div.onclick = () => moveTile(index);
                board.appendChild(div);
            });
        }

        function moveTile(index) {
            const emptyIdx = tiles.indexOf(gridSize * gridSize - 1);
            const row = Math.floor(index/gridSize), col = index%gridSize;
            const eRow = Math.floor(emptyIdx/gridSize), eCol = emptyIdx%gridSize;
            if (Math.abs(row-eRow) + Math.abs(col-eCol) === 1) {
                [tiles[index], tiles[emptyIdx]] = [tiles[emptyIdx], tiles[index]];
                createBoard();
                if (tiles.every((t, i) => t === i)) {
                    score += 50;
                    localStorage.setItem('diamondScore', score);
                    document.getElementById('total-diamonds').innerText = score;
                    tg.showAlert("Congrats! +50 💎");
                    shuffle();
                }
            }
        }

        function shuffle() {
            for (let i = 0; i < 200; i++) {
                const emptyIdx = tiles.indexOf(gridSize * gridSize - 1);
                const n = [];
                if (emptyIdx >= gridSize) n.push(emptyIdx - gridSize);
                if (emptyIdx < gridSize*(gridSize-1)) n.push(emptyIdx + gridSize);
                if (emptyIdx % gridSize !== 0) n.push(emptyIdx - 1);
                if (emptyIdx % gridSize !== gridSize-1) n.push(emptyIdx + 1);
                const r = n[Math.floor(Math.random()*n.length)];
                [tiles[emptyIdx], tiles[r]] = [tiles[r], tiles[emptyIdx]];
            }
            createBoard();
        }
        initGame();
    </script>
</body>
</html>
