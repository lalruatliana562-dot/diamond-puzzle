  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Diamond Puzzle Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; padding: 20px; overflow: hidden; }
        #puzzle-board { display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px); gap: 5px; justify-content: center; margin-top: 20px; }
        .tile { width: 100px; height: 100px; background-image: url('https://img.freepik.com/free-photo/shiny-diamond-crystal-gemstone-luxury-wealth_53876-121226.jpg'); background-size: 300px 300px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }
        .empty { background: #333; cursor: default; }
        .btn { background: #0088cc; color: white; border: none; padding: 10px 20px; border-radius: 8px; margin-top: 20px; font-size: 16px; }
    </style>
</head>
<body>
    <h2>💎 Diamond Puzzle</h2>
    <p>Welcome, <span id="user-name">Player</span>!</p>
    
    <div id="puzzle-board"></div>
    <button class="btn" onclick="shuffle()">Restart Game</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "Player";

        const board = document.getElementById('puzzle-board');
        let tiles = [0, 1, 2, 3, 4, 5, 6, 7, 8]; // 8 is empty

        function createBoard() {
            board.innerHTML = '';
            tiles.forEach((tile, index) => {
                const div = document.createElement('div');
                div.classList.add('tile');
                if (tile === 8) {
                    div.classList.add('empty');
                    div.innerText = '';
                } else {
                    const x = (tile % 3) * 100;
                    const y = Math.floor(tile / 3) * 100;
                    div.style.backgroundPosition = `-${x}px -${y}px`;
                }
                div.onclick = () => moveTile(index);
                board.appendChild(div);
            });
        }

        function moveTile(index) {
            const emptyIndex = tiles.indexOf(8);
            const validMoves = [index-1, index+1, index-3, index+3];
            if (validMoves.includes(emptyIndex)) {
                [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
                createBoard();
                checkWin();
            }
        }

        function shuffle() {
            tiles.sort(() => Math.random() - 0.5);
            createBoard();
        }

        function checkWin() {
            if (tiles.every((tile, i) => tile === i)) {
                alert("Wow! I rem dik ta! 💎");
            }
        }

        createBoard();
    </script>
</body>
</html>
