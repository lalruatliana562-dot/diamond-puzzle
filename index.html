 <!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Diamond Puzzle Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .stats { display: flex; justify-content: space-around; background: #1e1e1e; padding: 10px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #00d2ff; }
        #puzzle-board { display: grid; grid-template-columns: repeat(3, 90px); grid-template-rows: repeat(3, 90px); gap: 8px; justify-content: center; margin-top: 10px; }
        .tile { width: 90px; height: 90px; background-image: url('https://img.freepik.com/free-photo/shiny-diamond-crystal-gemstone-luxury-wealth_53876-121226.jpg'); background-size: 270px 270px; border-radius: 8px; cursor: pointer; border: 1px solid #444; }
        .empty { background: #222; border: none; }
        .btn { background: linear-gradient(135deg, #0088cc, #00d2ff); color: white; border: none; padding: 12px 25px; border-radius: 10px; margin-top: 25px; font-weight: bold; width: 100%; max-width: 200px; }
    </style>
</head>
<body>
    <h3>💎 Diamond Puzzle Pro</h3>
    
    <div class="stats">
        <div>Player: <b id="user-name">...</b></div>
        <div>Total: <b id="total-diamonds">0</b> 💎</div>
    </div>

    <div id="puzzle-board"></div>
    <button class="btn" onclick="shuffle()">Restart Puzzle</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "User";

        let score = parseInt(localStorage.getItem('diamondScore')) || 0;
        document.getElementById('total-diamonds').innerText = score;

        const board = document.getElementById('puzzle-board');
        let tiles = [0, 1, 2, 3, 4, 5, 6, 7, 8];

        function createBoard() {
            board.innerHTML = '';
            tiles.forEach((tile, index) => {
                const div = document.createElement('div');
                div.classList.add('tile');
                if (tile === 8) {
                    div.classList.add('empty');
                } else {
                    const x = (tile % 3) * 90;
                    const y = Math.floor(tile / 3) * 90;
                    div.style.backgroundPosition = `-${x}px -${y}px`;
                }
                div.onclick = () => moveTile(index);
                board.appendChild(div);
            });
        }

        function moveTile(index) {
            const emptyIndex = tiles.indexOf(8);
            if ([index-1, index+1, index-3, index+3].includes(emptyIndex)) {
                [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
                createBoard();
                checkWin();
            }
        }

        function checkWin() {
            if (tiles.every((tile, i) => tile === i)) {
                score += 500;
                localStorage.setItem('diamondScore', score);
                document.getElementById('total-diamonds').innerText = score;
                tg.HapticFeedback.notificationOccurred('success');
                alert("CONGRATS! 💎 500 Diamonds i hlawh e!");
                shuffle();
            }
        }

        function shuffle() {
            tiles.sort(() => Math.random() - 0.5);
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
